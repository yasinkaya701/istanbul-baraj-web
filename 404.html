  <meta http-equiv="refresh" content="0; url=https://yasinkaya701.github.io/istanbul-baraj-doluluk-orani-projeksiyonu/" />
  <script>
    (function () {
      var targetBase = "https://yasinkaya701.github.io/istanbul-baraj-doluluk-orani-projeksiyonu";
      var oldBase = "/istanbul-baraj-web";
      var p = window.location.pathname || "/";
      if (p.indexOf(oldBase) === 0) p = p.slice(oldBase.length);
      if (!p.startsWith("/")) p = "/" + p;
      var target = targetBase + p + window.location.search + window.location.hash;
      window.location.replace(target);
    })();
  </script>

    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 40px; color: #1f2937; }
